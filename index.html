<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ChoreoFlow 隊形小工具</title>
  
  <!-- 載入 Tailwind CSS (排版與顏色) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 FontAwesome Icon (圖示) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- 載入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel (讓瀏覽器能即時看懂 JSX 語法) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-900 text-white overflow-hidden">
  
  <!-- React 會把畫面渲染到這裡 -->
  <div id="root"></div>

  <!-- 主要程式碼區塊 -->
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // --- 工具函數 ---
    const generateId = () => Math.random().toString(36).substr(2, 9);
    const formatTime = (seconds) => {
      if (!seconds || isNaN(seconds)) return "00:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    };

    // 預設舞者顏色
    const DANCER_COLORS = [
      'bg-red-500', 'bg-blue-500', 'bg-green-500', 'bg-yellow-500', 
      'bg-purple-500', 'bg-pink-500', 'bg-indigo-500', 'bg-teal-500',
      'bg-orange-500', 'bg-cyan-500'
    ];

    const LOCAL_STORAGE_KEY = 'choreoflow_projects_v1';
    const LOCAL_STORAGE_ID_KEY = 'choreoflow_current_id';

    // --- 主要元件 ---
    function App() {
      // --- 狀態管理 (加入 LocalStorage 讀取) ---
      const [projects, setProjects] = useState(() => {
        try {
          const saved = localStorage.getItem(LOCAL_STORAGE_KEY);
          if (saved) {
            const parsed = JSON.parse(saved);
            return parsed.map(p => ({
              ...p,
              audioUrl: p.audioUrl?.startsWith('blob:') ? null : p.audioUrl
            }));
          }
        } catch (e) {
          console.error("載入存檔失敗:", e);
        }
        return [];
      });

      const [currentProjectId, setCurrentProjectId] = useState(() => {
        return localStorage.getItem(LOCAL_STORAGE_ID_KEY) || null;
      });

      const [currentTime, setCurrentTime] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [duration, setDuration] = useState(0);
      const [snapToGrid, setSnapToGrid] = useState(true);
      const [isEditingNames, setIsEditingNames] = useState(false); 
      const [isSidebarOpen, setIsSidebarOpen] = useState(false); // 新增：側邊欄狀態 (RWD)

      const audioRef = useRef(null);
      const stageRef = useRef(null);

      // 取得當前專案
      const project = projects.find(p => p.id === currentProjectId);

      // 初始化預設專案
      useEffect(() => {
        if (projects.length === 0) {
          const defaultProject = createNewProject("我的第一支舞");
          setProjects([defaultProject]);
          setCurrentProjectId(defaultProject.id);
        }
      }, [projects]);

      // 自動存檔機制
      useEffect(() => {
        if (projects.length > 0) {
          localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(projects));
          if (currentProjectId) {
            localStorage.setItem(LOCAL_STORAGE_ID_KEY, currentProjectId);
          }
        }
      }, [projects, currentProjectId]);

      // 匯出功能
      const handleExport = () => {
        const dataStr = JSON.stringify(projects, null, 2);
        const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
        const exportFileDefaultName = `ChoreoFlow_Backup_${new Date().toISOString().split('T')[0]}.json`;
        
        const linkElement = document.createElement('a');
        linkElement.setAttribute('href', dataUri);
        linkElement.setAttribute('download', exportFileDefaultName);
        linkElement.click();
      };

      // 匯入功能
      const handleImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedProjects = JSON.parse(event.target.result);
            if (Array.isArray(importedProjects)) {
              const sanitized = importedProjects.map(p => ({
                ...p,
                audioUrl: p.audioUrl?.startsWith('blob:') ? null : p.audioUrl
              }));
              setProjects(sanitized);
              setCurrentProjectId(sanitized[0]?.id || null);
              alert('匯入成功！請重新點擊「上傳音樂」載入音檔。');
              setIsSidebarOpen(false); // 匯入後自動關閉側邊欄
            } else {
              alert('檔案格式錯誤');
            }
          } catch (err) {
            alert('讀取檔案失敗');
          }
        };
        reader.readAsText(file);
        e.target.value = null;
      };

      const handleTimeUpdate = () => {
        if (audioRef.current) {
          setCurrentTime(audioRef.current.currentTime);
        }
      };

      const handleAudioLoaded = () => {
        if (audioRef.current) {
          setDuration(audioRef.current.duration);
        }
      };

      const togglePlay = () => {
        if (!audioRef.current || !project?.audioUrl) {
          alert("請先上傳音樂檔案！");
          return;
        }
        if (isPlaying) {
          audioRef.current.pause();
        } else {
          audioRef.current.play();
        }
        setIsPlaying(!isPlaying);
      };

      const createNewProject = (name) => {
        return {
          id: generateId(),
          name: name || `未命名專案 ${projects.length + 1}`,
          dancerCount: 5,
          dancerNames: {}, 
          audioUrl: null,
          bpm: 120,
          duration: 180,
          formations: [
            { id: generateId(), time: 0, positions: generateDefaultPositions(5) }
          ],
          sections: []
        };
      };

      const generateDefaultPositions = (count) => {
        const positions = {};
        for (let i = 0; i < count; i++) {
          positions[i] = { 
            x: 50 + (i - Math.floor(count / 2)) * 10, 
            y: 50 
          };
        }
        return positions;
      };

      const handleAddProject = () => {
        const name = prompt("請輸入新專案名稱：");
        if (name) {
          const newProj = createNewProject(name);
          setProjects(prev => [...prev, newProj]);
          setCurrentProjectId(newProj.id);
          setCurrentTime(0);
          setIsPlaying(false);
          setDuration(newProj.duration);
          setIsSidebarOpen(false); // 新增專案後關閉側邊欄
        }
      };

      // 修正：使用安全的函數式更新，避免拖曳時資料舊換新卡住
      const updateProject = (updates) => {
        setProjects(prevProjects => prevProjects.map(p => p.id === currentProjectId ? { ...p, ...updates } : p));
      };

      const getCurrentFormation = () => {
        if (!project) return null;
        const sorted = [...project.formations].sort((a, b) => a.time - b.time);
        let active = sorted[0];
        for (let f of sorted) {
          if (f.time <= currentTime) {
            active = f;
          } else {
            break;
          }
        }
        return active;
      };

      const activeFormation = getCurrentFormation();

      // 修正：重寫拖曳引擎，同時完美支援滑鼠與觸控
      const handleDancerDragStart = (dancerId, e) => {
        if (!stageRef.current || !activeFormation) return;
        
        e.stopPropagation();

        let targetFormationId = activeFormation.id;
        
        // 如果目前時間沒有關鍵幀，自動建立一個
        if (Math.abs(activeFormation.time - currentTime) > 0.5) {
            targetFormationId = generateId();
            const newFormation = {
                id: targetFormationId,
                time: currentTime,
                positions: { ...activeFormation.positions }
            };
            setProjects(prevProjects => prevProjects.map(p => {
                if (p.id === currentProjectId) {
                    return { ...p, formations: [...p.formations, newFormation] };
                }
                return p;
            }));
        }

        const stageRect = stageRef.current.getBoundingClientRect();
        
        const onMove = (moveEvent) => {
          // 支援觸控與滑鼠事件
          const clientX = moveEvent.touches ? moveEvent.touches[0].clientX : moveEvent.clientX;
          const clientY = moveEvent.touches ? moveEvent.touches[0].clientY : moveEvent.clientY;
          
          let newX = ((clientX - stageRect.left) / stageRect.width) * 100;
          let newY = ((clientY - stageRect.top) / stageRect.height) * 100;
          
          if (snapToGrid) {
            const snapSize = 5;
            newX = Math.round(newX / snapSize) * snapSize;
            newY = Math.round(newY / snapSize) * snapSize;
          }

          newX = Math.max(0, Math.min(100, newX));
          newY = Math.max(0, Math.min(100, newY));

          // 確保拖拉過程中的資料同步更新，不卡頓
          setProjects(prevProjects => prevProjects.map(p => {
            if (p.id === currentProjectId) {
              return {
                ...p,
                formations: p.formations.map(f => f.id === targetFormationId ? {
                  ...f,
                  positions: {
                    ...f.positions,
                    [dancerId]: { x: newX, y: newY }
                  }
                } : f)
              };
            }
            return p;
          }));
        };

        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          document.removeEventListener('touchmove', onMove);
          document.removeEventListener('touchend', onUp);
        };

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onUp);
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const url = URL.createObjectURL(file);
          updateProject({ audioUrl: url });
          setCurrentTime(0);
          if (audioRef.current) {
            audioRef.current.load();
          }
        }
      };

      const handleTimelineClick = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        // 支援觸控與滑鼠事件
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const x = clientX - rect.left;
        const percentage = Math.max(0, Math.min(1, x / rect.width));
        const newTime = percentage * duration;
        
        setCurrentTime(newTime);
        if (audioRef.current) {
          audioRef.current.currentTime = newTime;
        }
      };

      const addKeyframe = () => {
        if (!project || !activeFormation) return;
        const exists = project.formations.some(f => Math.abs(f.time - currentTime) < 0.5);
        if (!exists) {
          const newFormation = {
            id: generateId(),
            time: currentTime,
            positions: { ...activeFormation.positions }
          };
          updateProject({ formations: [...project.formations, newFormation] });
        }
      };

      const deleteKeyframe = (id) => {
        if (project.formations.length <= 1) {
          alert("至少需要保留一個隊形！");
          return;
        }
        updateProject({ formations: project.formations.filter(f => f.id !== id) });
      };

      const addSection = () => {
        const name = prompt("段落名稱 (例如：Intro, Chorus)：", "Chorus");
        if (name) {
          const newSection = {
            id: generateId(),
            name,
            time: currentTime,
            color: ['bg-red-400', 'bg-blue-400', 'bg-green-400', 'bg-purple-400'][project.sections.length % 4]
          };
          updateProject({ sections: [...project.sections, newSection].sort((a,b) => a.time - b.time) });
        }
      };

      if (!project) return <div className="min-h-screen bg-neutral-900 text-white flex items-center justify-center">載入中...</div>;

      return (
        <div className="min-h-screen bg-neutral-900 text-neutral-100 flex font-sans overflow-hidden w-full relative">
          
          {project.audioUrl && (
            <audio 
              ref={audioRef} 
              src={project.audioUrl} 
              onTimeUpdate={handleTimeUpdate}
              onLoadedMetadata={handleAudioLoaded}
              onEnded={() => setIsPlaying(false)}
            />
          )}

          {/* 手機版側邊欄背景遮罩 */}
          {isSidebarOpen && (
            <div 
              className="fixed inset-0 bg-black/60 z-40 lg:hidden"
              onClick={() => setIsSidebarOpen(false)}
            />
          )}

          {/* 左側邊欄 (支援 RWD 滑出) */}
          <div className={`fixed inset-y-0 left-0 z-50 w-64 bg-neutral-950 border-r border-neutral-800 flex flex-col transform transition-transform duration-300 ease-in-out lg:relative lg:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="p-4 border-b border-neutral-800 flex items-center justify-between">
              <h1 className="text-xl font-bold bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent flex items-center gap-2">
                <i className="fas fa-wave-square text-purple-500"></i>
                隊形小工具
              </h1>
              {/* 手機版關閉側邊欄按鈕 */}
              <button className="lg:hidden text-neutral-400 hover:text-white" onClick={() => setIsSidebarOpen(false)}>
                <i className="fas fa-times text-xl"></i>
              </button>
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-2">
              <div className="flex justify-between items-center mb-2">
                <span className="text-xs text-neutral-500 font-semibold uppercase tracking-wider">表演專案</span>
                <span className="text-[10px] text-green-500 flex items-center gap-1 opacity-70">
                  <i className="fas fa-save"></i> 已儲存
                </span>
              </div>
              {projects.map(p => (
                <button
                  key={p.id}
                  onClick={() => {
                    setCurrentProjectId(p.id);
                    setIsSidebarOpen(false); // 切換專案後自動收起
                  }}
                  className={`w-full text-left px-3 py-2 rounded-lg flex items-center gap-3 transition-colors ${
                    currentProjectId === p.id ? 'bg-purple-600/20 text-purple-400 border border-purple-500/30' : 'hover:bg-neutral-800 text-neutral-400'
                  }`}
                >
                  <i className="fas fa-folder text-sm w-4 text-center shrink-0"></i>
                  <span className="truncate">{p.name}</span>
                </button>
              ))}
              <button 
                onClick={handleAddProject}
                className="w-full mt-4 px-3 py-2 rounded-lg border border-dashed border-neutral-700 text-neutral-400 hover:text-white hover:border-neutral-500 flex items-center justify-center gap-2 transition-colors"
              >
                <i className="fas fa-plus"></i>
                新增專案
              </button>
              
              <div className="my-4 border-t border-neutral-800 pt-4 space-y-2">
                <button 
                  onClick={handleExport}
                  className="w-full px-3 py-2 rounded-lg bg-neutral-800 text-neutral-300 hover:bg-neutral-700 hover:text-white flex items-center gap-2 transition-colors text-sm"
                >
                  <i className="fas fa-download w-4 text-center shrink-0"></i>
                  匯出備份
                </button>
                <label className="w-full px-3 py-2 rounded-lg bg-neutral-800 text-neutral-300 hover:bg-neutral-700 hover:text-white flex items-center gap-2 transition-colors text-sm cursor-pointer">
                  <i className="fas fa-cloud-upload-alt w-4 text-center shrink-0"></i>
                  <span>匯入檔案</span>
                  <input type="file" accept=".json" className="hidden" onChange={handleImport} />
                </label>
              </div>
            </div>
          </div>

          {/* 右側主要工作區 */}
          <div className="flex-1 flex flex-col h-screen overflow-hidden w-full relative">
            
            {/* 頂部工具列 (支援 RWD 折行與縮減尺寸) */}
            <header className="min-h-[4rem] h-auto py-3 bg-neutral-900 border-b border-neutral-800 flex flex-col lg:flex-row items-start lg:items-center px-4 lg:px-6 justify-between shrink-0 gap-3">
              <div className="flex items-center gap-3 w-full lg:w-auto overflow-hidden">
                {/* 漢堡選單 (只在手機/平板顯示) */}
                <button className="lg:hidden text-neutral-400 hover:text-white shrink-0" onClick={() => setIsSidebarOpen(true)}>
                  <i className="fas fa-bars text-xl"></i>
                </button>
                <h2 className="text-base sm:text-lg font-medium flex items-center gap-2 truncate">
                  <span className="truncate">{project.name}</span>
                  <button onClick={() => {
                    const newName = prompt("重新命名專案：", project.name);
                    if(newName) updateProject({name: newName});
                  }} className="text-neutral-500 hover:text-white transition shrink-0"><i className="fas fa-pen text-sm"></i></button>
                </h2>
              </div>
              
              <div className="flex flex-wrap items-center gap-2 sm:gap-4 w-full lg:w-auto">
                <div className="flex items-center gap-1 sm:gap-2 text-xs sm:text-sm bg-neutral-800 px-2 sm:px-3 py-1 sm:py-1.5 rounded-full border border-neutral-700">
                  <i className="fas fa-users text-neutral-400"></i>
                  <span className="text-neutral-300 hidden sm:inline">舞者:</span>
                  <input 
                    type="number" min="1" max="50" value={project.dancerCount}
                    onChange={(e) => {
                      const count = parseInt(e.target.value) || 1;
                      const newPositions = generateDefaultPositions(count);
                      const updatedFormations = project.formations.map(f => ({
                        ...f, positions: { ...newPositions, ...f.positions }
                      }));
                      updateProject({ dancerCount: count, formations: updatedFormations });
                    }}
                    className="w-10 sm:w-12 bg-transparent text-white focus:outline-none text-center"
                  />
                  <button 
                    onClick={() => setIsEditingNames(true)}
                    className="ml-1 sm:ml-2 px-1.5 sm:px-2 py-0.5 sm:py-1 bg-neutral-700 hover:bg-neutral-600 rounded text-xs transition"
                    title="設定舞者名稱"
                  >
                    <i className="fas fa-edit"></i> <span className="hidden sm:inline">命名</span>
                  </button>
                </div>

                <button
                  onClick={() => setSnapToGrid(!snapToGrid)}
                  className={`flex items-center gap-1 sm:gap-2 text-xs sm:text-sm px-2 sm:px-3 py-1 sm:py-1.5 rounded-full border transition-colors ${
                    snapToGrid ? 'bg-purple-600/20 text-purple-400 border-purple-500/50' : 'bg-neutral-800 text-neutral-400 border-neutral-700 hover:text-white'
                  }`}
                  title={snapToGrid ? "對齊網格" : "自由移動"}
                >
                  <i className="fas fa-border-all"></i>
                  <span className="hidden sm:inline">{snapToGrid ? "對齊" : "自由"}</span>
                </button>

                <label className="flex items-center gap-1 sm:gap-2 text-xs sm:text-sm bg-purple-600 hover:bg-purple-500 text-white px-3 sm:px-4 py-1 sm:py-1.5 rounded-full cursor-pointer transition-colors shadow-lg shadow-purple-500/20">
                  <i className="fas fa-upload"></i>
                  <span>{project.audioUrl ? "重傳音樂" : "上傳音樂"}</span>
                  <input type="file" accept="audio/*" className="hidden" onChange={handleFileUpload} />
                </label>
              </div>
            </header>

            {/* 舞台區域 */}
            <main className="flex-1 relative bg-neutral-950 p-2 sm:p-6 flex flex-col select-none min-h-[40vh]">
               <div 
                 ref={stageRef}
                 className="flex-1 w-full max-w-5xl mx-auto border-2 border-neutral-800 rounded-lg sm:rounded-2xl bg-neutral-900 relative shadow-2xl overflow-hidden touch-none"
                 style={{ 
                   backgroundImage: snapToGrid ? 'linear-gradient(to right, #404040 1px, transparent 1px), linear-gradient(to bottom, #404040 1px, transparent 1px)' : 'none',
                   backgroundSize: '10% 10%' // RWD: 在手機上把網格畫大一點比較好對齊
                 }}
               >
                 {/* 中心與邊界線 */}
                 <div className="absolute top-1/2 left-1/2 w-4 h-4 -translate-x-1/2 -translate-y-1/2 border-2 border-red-500/30 rounded-full"></div>
                 <div className="absolute top-0 bottom-0 left-1/2 w-px bg-red-500/20"></div>
                 <div className="absolute left-0 right-0 top-1/2 h-px bg-red-500/20"></div>
                 <div className="absolute bottom-2 sm:bottom-4 left-1/2 -translate-x-1/2 text-neutral-600 font-bold tracking-[0.2em] sm:tracking-[0.5em] uppercase text-xs sm:text-sm">Front</div>

                 {/* 渲染舞者 */}
                 {activeFormation && Array.from({ length: project.dancerCount }).map((_, i) => {
                   const pos = activeFormation.positions[i] || { x: 50, y: 50 };
                   const displayName = project.dancerNames?.[i] || (i + 1);
                   return (
                     <div
                       key={i}
                       onMouseDown={(e) => handleDancerDragStart(i, e)}
                       onTouchStart={(e) => handleDancerDragStart(i, e)}
                       className={`absolute w-auto min-w-[2rem] sm:min-w-[2.5rem] h-8 sm:h-10 px-1 sm:px-2 -translate-x-1/2 -translate-y-1/2 rounded-full shadow-lg border-2 border-white/20 flex items-center justify-center font-bold text-xs sm:text-base cursor-grab active:cursor-grabbing hover:scale-110 transition-transform ${DANCER_COLORS[i % DANCER_COLORS.length]}`}
                       style={{ left: `${pos.x}%`, top: `${pos.y}%`, transition: isPlaying ? 'left 0.1s linear, top 0.1s linear' : 'none', whiteSpace: 'nowrap' }}
                       title={`舞者 ${displayName}`}
                     >
                       {displayName}
                     </div>
                   );
                 })}
               </div>
            </main>

            {/* 底部時間軸控制區 */}
            <footer className="h-auto min-h-[12rem] bg-neutral-900 border-t border-neutral-800 flex flex-col shrink-0">
              {/* 控制面板 (RWD 自動折行) */}
              <div className="flex flex-col md:flex-row items-start md:items-center justify-between px-4 sm:px-6 py-3 border-b border-neutral-800 gap-3 md:gap-0">
                <div className="flex items-center gap-4 w-full md:w-auto">
                  <button onClick={togglePlay} className="w-10 h-10 sm:w-12 sm:h-12 shrink-0 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition-transform shadow-lg shadow-white/10">
                    <i className={`fas fa-${isPlaying ? 'pause' : 'play'} ${!isPlaying && 'ml-1'} text-lg sm:text-xl`}></i>
                  </button>
                  <div className="text-xl sm:text-2xl font-mono tracking-wider font-light text-purple-400 w-auto min-w-[4rem] sm:w-24">
                    {formatTime(currentTime)}
                  </div>
                  <div className="text-neutral-500 text-xs sm:text-sm">/ {formatTime(duration)}</div>
                </div>

                <div className="flex flex-wrap items-center gap-2 sm:gap-3 w-full md:w-auto justify-end">
                  <div className="flex items-center gap-2 bg-neutral-800 px-2 sm:px-3 py-1 sm:py-1.5 rounded-lg text-xs sm:text-sm border border-neutral-700">
                    <i className="fas fa-music text-neutral-400"></i>
                    <span className="text-neutral-400 hidden sm:inline">BPM:</span>
                    <input 
                      type="number" value={project.bpm} 
                      onChange={e => updateProject({bpm: parseInt(e.target.value) || 120})}
                      className="w-10 sm:w-12 bg-transparent text-white focus:outline-none"
                    />
                  </div>
                  <button onClick={addSection} className="px-3 sm:px-4 py-1.5 sm:py-2 bg-neutral-800 hover:bg-neutral-700 text-neutral-200 rounded-lg text-xs sm:text-sm flex items-center gap-1 sm:gap-2 border border-neutral-700">
                    <i className="fas fa-align-justify"></i> <span className="hidden sm:inline">標記段落</span>
                  </button>

                  {project.formations.some(f => Math.abs(f.time - currentTime) < 0.1) && project.formations.length > 1 && (
                    <button 
                      onClick={() => deleteKeyframe(activeFormation.id)} 
                      className="px-3 sm:px-4 py-1.5 sm:py-2 bg-red-600 hover:bg-red-500 text-white rounded-lg text-xs sm:text-sm flex items-center gap-1 sm:gap-2 shadow-lg shadow-red-500/20"
                    >
                      <i className="fas fa-trash"></i> <span className="hidden sm:inline">刪除隊形</span>
                    </button>
                  )}

                  <button onClick={addKeyframe} className="px-3 sm:px-4 py-1.5 sm:py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-xs sm:text-sm flex items-center gap-1 sm:gap-2 shadow-lg shadow-indigo-500/20">
                    <i className="fas fa-map-marker-alt"></i> <span className="hidden sm:inline">記錄隊形</span>
                  </button>
                </div>
              </div>

              {/* 時間軸本體 */}
              <div className="flex-1 min-h-[7rem] relative px-4 sm:px-6 py-3 sm:py-4 flex flex-col select-none overflow-hidden">
                {/* 段落標籤區 */}
                <div className="h-5 sm:h-6 relative mb-2">
                  {project.sections.map((sec, idx) => {
                    const nextSec = project.sections[idx + 1];
                    const endTime = nextSec ? nextSec.time : duration;
                    const left = (sec.time / (duration || 1)) * 100;
                    const width = ((endTime - sec.time) / (duration || 1)) * 100;
                    return (
                      <div key={sec.id} className={`absolute top-0 h-full ${sec.color} rounded-sm px-1 sm:px-2 flex items-center text-[10px] sm:text-xs font-bold text-black/80 truncate border border-black/20`} style={{ left: `${left}%`, width: `${width}%` }}>
                        <span className="truncate">{sec.name}</span>
                        <button onClick={(e) => { e.stopPropagation(); updateProject({ sections: project.sections.filter(s => s.id !== sec.id) }); }} className="ml-auto opacity-50 hover:opacity-100 pl-1 shrink-0">
                          <i className="fas fa-trash text-[8px] sm:text-[10px]"></i>
                        </button>
                      </div>
                    );
                  })}
                </div>

                {/* 音軌區 */}
                <div className="flex-1 bg-neutral-950 rounded-lg sm:rounded-xl relative cursor-pointer group border border-neutral-800 overflow-hidden" 
                     onPointerDown={handleTimelineClick}
                     onPointerMove={(e) => {
                       if (e.buttons === 1 || e.touches) handleTimelineClick(e);
                     }}>
                  <div className="absolute inset-0 opacity-20" style={{ backgroundImage: 'linear-gradient(90deg, #333 1px, transparent 1px)', backgroundSize: '20px 100%' }}></div>
                  {project.bpm > 0 && duration > 0 && (
                    <div className="absolute inset-0 pointer-events-none opacity-10">
                      {Array.from({ length: Math.floor(duration / (60 / project.bpm)) }).map((_, i) => (
                        <div key={i} className="absolute top-0 bottom-0 w-px bg-white" style={{ left: `${((i * (60 / project.bpm)) / duration) * 100}%` }} />
                      ))}
                    </div>
                  )}
                  <div className="absolute top-0 bottom-0 left-0 bg-purple-500/20 border-r-2 border-purple-500 shadow-[0_0_15px_rgba(168,85,247,0.5)] pointer-events-none z-10" style={{ width: `${(currentTime / (duration || 1)) * 100}%` }}></div>
                  
                  {/* 隊形點 */}
                  {project.formations.map((f, i) => (
                    <div
                      key={f.id}
                      className={`absolute top-1/2 -translate-y-1/2 w-3 h-3 sm:w-4 sm:h-4 rounded-full border-2 transform -translate-x-1/2 cursor-pointer z-20 transition-all ${activeFormation?.id === f.id ? 'bg-white border-purple-500 scale-150' : 'bg-neutral-600 border-neutral-400'}`}
                      style={{ left: `${(f.time / (duration || 1)) * 100}%` }}
                      onClick={(e) => { e.stopPropagation(); setCurrentTime(f.time); if (audioRef.current) audioRef.current.currentTime = f.time; }}
                      title={`隊形 ${i + 1}`}
                    />
                  ))}
                </div>

                <div className="text-[10px] sm:text-xs text-neutral-500 mt-2 flex flex-col sm:flex-row justify-between gap-1 sm:gap-0">
                  <span>點擊時間軸切換隊形，選中後點擊右方按鈕刪除</span>
                  <span className="hidden sm:inline">提示：在舞台上直接拖曳舞者會自動建立新隊形</span>
                </div>
              </div>
            </footer>
          </div>

          {/* 命名舞者的彈出視窗 (Modal 支援 RWD) */}
          {isEditingNames && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[60] p-4">
              <div className="bg-neutral-900 border border-neutral-700 rounded-xl w-full max-w-[90%] md:max-w-md p-4 sm:p-6 flex flex-col max-h-[80vh] shadow-2xl">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-lg sm:text-xl font-bold">設定舞者名稱</h3>
                  <button onClick={() => setIsEditingNames(false)} className="text-neutral-500 hover:text-white p-2">
                    <i className="fas fa-times text-xl"></i>
                  </button>
                </div>
                <div className="flex-1 overflow-y-auto space-y-3 pr-2">
                  {Array.from({ length: project.dancerCount }).map((_, i) => (
                    <div key={i} className="flex items-center gap-2 sm:gap-3">
                      <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shrink-0 shadow ${DANCER_COLORS[i % DANCER_COLORS.length]}`}>
                        {i + 1}
                      </div>
                      <input
                        type="text"
                        placeholder={`例如：小明`}
                        value={project.dancerNames?.[i] || ''}
                        onChange={(e) => {
                          const newNames = { ...project.dancerNames, [i]: e.target.value };
                          updateProject({ dancerNames: newNames });
                        }}
                        className="flex-1 bg-neutral-800 border border-neutral-600 rounded px-2 sm:px-3 py-1.5 sm:py-2 text-white focus:outline-none focus:border-purple-500 text-sm sm:text-base"
                      />
                    </div>
                  ))}
                </div>
                <div className="mt-4 sm:mt-6 flex justify-end">
                  <button 
                    onClick={() => setIsEditingNames(false)}
                    className="px-5 sm:px-6 py-1.5 sm:py-2 bg-purple-600 hover:bg-purple-500 rounded-lg font-medium transition shadow-lg w-full sm:w-auto"
                  >
                    完成
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // 啟動 React 應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
